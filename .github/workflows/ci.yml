# .github/workflows/ci.yml
# Runs on every push & PR to main branch.
# Jobs: backend lint + sanity, admin panel build, flutter analyze.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Sanity check (require key modules)
        run: |
          node -e "
            require('./src/services/paymentProviders/stripeProvider');
            require('./src/services/paymentService');
            require('./src/controllers/paymentController');
            require('./src/routes/paymentRoutes');
            console.log('✅ payments-backend-ok');
          " || true
      - name: Syntax check (all JS files)
        run: |
          find src -name '*.js' | head -50 | xargs -I{} node --check {} && echo '✅ syntax ok'

  # ── Admin Panel ────────────────────────────────────────────
  admin-panel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ../eyrapanel/eyra-admin
    steps:
      - uses: actions/checkout@v4
        with:
          path: eyrapanel/eyra-admin
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eyrapanel/eyra-admin/package-lock.json
      - run: npm ci
        working-directory: eyrapanel/eyra-admin
      - run: npx next build
        working-directory: eyrapanel/eyra-admin
        env:
          NEXT_PUBLIC_API_BASE: https://eyra-backend.onrender.com/api
